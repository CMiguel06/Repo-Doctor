services:
  postgres:
    image: postgres:16-alpine
    container_name: repo-doctor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: repo_doctor
      POSTGRES_PASSWORD: repo_doctor
      POSTGRES_DB: repo_doctor
    ports:
      - "5432:5432"
    volumes:
      - repo_doctor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repo_doctor -d repo_doctor"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repo-doctor-web
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://repo_doctor:repo_doctor@postgres:5432/repo_doctor?schema=public
      NEXT_PUBLIC_APP_NAME: Repo Doctor
    ports:
      - "3000:3000"

volumes:
  repo_doctor_postgres_data:
